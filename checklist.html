<!-- checklist.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чеклисты — TravelPlan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/dashboard.css">
    <link rel="stylesheet" href="style/checklist.css"></head>
<body class="dash-body">

<header class="header header--solid" id="header">
    <div class="header__inner">
        <a href="index.html" class="logo">
            <div class="logo__icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="#fff"/>
                </svg>
            </div>
            <span>TravelPlan</span>
        </a>
        <nav class="nav" id="nav">
            <a href="dashboard.html" class="nav__link">Мои поездки</a>
            <a href="trip-create.html" class="nav__link">Новая поездка</a>
            <a href="budget.html" class="nav__link">Бюджет</a>
            <a href="checklist.html" class="nav__link nav__link--active">Чеклисты</a>
        </nav>
        <div class="header__actions">
            <div class="user-pill" id="userPill">
                <div class="user-pill__avatar" id="headerAvatar"></div>
                <span class="user-pill__name" id="headerName"></span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M6 9l6 6 6-6" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <div class="user-pill__dropdown">
                    <div class="user-pill__dropdown-info">
                        <div class="user-pill__dropdown-name" id="dropName"></div>
                        <div class="user-pill__dropdown-email" id="dropEmail"></div>
                    </div>
                    <div class="user-pill__dropdown-divider"></div>
                    <a href="profile.html" class="user-pill__dropdown-item">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        Профиль
                    </a>
                    <div class="user-pill__dropdown-divider"></div>
                    <button class="user-pill__dropdown-item user-pill__dropdown-item--danger" id="logoutBtn">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        Выйти
                    </button>
                </div>
            </div>
        </div>
        <button class="burger" id="burger" aria-label="Меню">
            <span></span><span></span><span></span>
        </button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
        <a href="dashboard.html" class="mobile-menu__link">Мои поездки</a>
        <a href="trip-create.html" class="mobile-menu__link">Новая поездка</a>
        <a href="budget.html" class="mobile-menu__link">Бюджет</a>
        <a href="checklist.html" class="mobile-menu__link">Чеклисты</a>
        <div class="mobile-menu__divider"></div>
        <a href="profile.html" class="mobile-menu__link">Профиль</a>
        <button class="mobile-menu__link mobile-menu__link--danger" id="logoutMobile">Выйти</button>
    </div>
</header>

<div class="dash-page">
    <div class="container">

        <div class="dash-head">
            <div>
                <h1 class="dash-head__title">Чеклисты</h1>
                <div class="dash-head__stats" id="clHeadSub">Управляй задачами по поездкам</div>
            </div>
        </div>

                <div id="clSkeleton" class="cl-skeleton">
            <div class="cl-skeleton__group">
                <div class="skeleton-line skeleton-line--title"></div>
                <div class="cl-skeleton__tasks">
                    <div class="skeleton-box"></div>
                    <div class="skeleton-box"></div>
                    <div class="skeleton-box"></div>
                </div>
            </div>
            <div class="cl-skeleton__group">
                <div class="skeleton-line skeleton-line--title"></div>
                <div class="cl-skeleton__tasks">
                    <div class="skeleton-box"></div>
                    <div class="skeleton-box"></div>
                </div>
            </div>
        </div>

                <div id="clContent" style="display:none">

                        <div class="cl-filter">
                <div class="cl-filter__trips" id="tripFilter">
                    <button class="cl-filter__btn cl-filter__btn--active" data-trip="all">Все поездки</button>
                </div>
                <div class="cl-filter__right">
                    <button class="cl-view-btn cl-view-btn--active" data-view="all">Все</button>
                    <button class="cl-view-btn" data-view="active">Активные</button>
                    <button class="cl-view-btn" data-view="done">Выполненные</button>
                </div>
            </div>

                        <div class="cl-summary">
                <div class="cl-summary__item">
                    <div class="cl-summary__val" id="sumTotal">0</div>
                    <div class="cl-summary__label">Всего задач</div>
                </div>
                <div class="cl-summary__divider"></div>
                <div class="cl-summary__item">
                    <div class="cl-summary__val cl-summary__val--green" id="sumDone">0</div>
                    <div class="cl-summary__label">Выполнено</div>
                </div>
                <div class="cl-summary__divider"></div>
                <div class="cl-summary__item">
                    <div class="cl-summary__val cl-summary__val--orange" id="sumLeft">0</div>
                    <div class="cl-summary__label">Осталось</div>
                </div>
                <div class="cl-summary__divider"></div>
                <div class="cl-summary__progress">
                    <div class="cl-summary__progress-label">
                        <span>Прогресс</span>
                        <span id="sumPct">0%</span>
                    </div>
                    <div class="cl-summary__bar">
                        <div class="cl-summary__bar-fill" id="sumBar"></div>
                    </div>
                </div>
            </div>

                        <div class="cl-quick-add">
                <div class="cl-quick-add__inner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="#01abfb" stroke-width="1.8"/>
                        <line x1="12" y1="8" x2="12" y2="16" stroke="#01abfb" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="8" y1="12" x2="16" y2="12" stroke="#01abfb" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="quickTaskInput" class="cl-quick-add__input" placeholder="Добавить задачу...">
                    <select id="quickTaskTrip" class="cl-quick-add__select">
                        <option value="">Выбери поездку</option>
                    </select>
                    <button class="btn btn--primary btn--sm" id="quickAddBtn">Добавить</button>
                </div>
            </div>

                        <div id="clGroups" class="cl-groups"></div>

                        <div class="cl-empty" id="clEmpty" style="display:none">
                <div class="cl-empty__icon">
                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none">
                        <path d="M9 11l3 3L22 4" stroke="#d0d5dd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="#d0d5dd" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3 class="cl-empty__title">Нет задач</h3>
                <p class="cl-empty__sub">Создай поездку и добавь задачи через форму выше</p>
                <a href="trip-create.html" class="btn btn--primary btn--sm" style="margin-top:20px">Создать поездку</a>
            </div>

        </div>

    </div>
</div>

<div id="toasts"></div>
<script src="main/utils.js"></script>
<script src="main/api.js"></script>
<script src="main/guard.js"></script>
<script src="main/notifications-bell.js"></script>
<script src="main/header-user.js"></script>
<script src="main/checklist.js"></script>
</body>
</html>
